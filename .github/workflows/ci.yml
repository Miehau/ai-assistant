name: CI

on:
  push:
  pull_request:

jobs:
  mcp-oauth:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Install frontend dependencies
        run: bun install --frozen-lockfile
      - name: Install backend dependencies
        working-directory: server
        run: bun install --frozen-lockfile
      - name: Run frontend MCP contract and artifact checks
        run: bun run test:mcp-frontend
      - name: Run deterministic MCP OAuth suite
        working-directory: server
        run: bun run test:mcp-oauth

  preflight:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      # Tauri v1's Wry 0.24 stack does not compile on Linux with Rust >= 1.94.
      - uses: dtolnay/rust-toolchain@1.93.1
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install dependencies
        run: bun install
      - name: Run preflight
        run: bun run preflight
